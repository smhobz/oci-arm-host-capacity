name: OCI ARM Instance Creator
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  try-ad1-4core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Install dependencies
        run: composer install --no-dev
      - name: Create private key file
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
      - name: Run - AD1 4core 24GB
        run: php index.php
        env:
          OCI_REGION: "eu-frankfurt-1"
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: "private_key.pem"
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_AVAILABILITY_DOMAIN: "aXdx:EU-FRANKFURT-1-AD-1"
          OCI_SHAPE: "VM.Standard.A1.Flex"
          OCI_OCPUS: "4"
          OCI_MEMORY_IN_GBS: "24"
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_IMAGE_ID: "ocid1.image.oc1.eu-frankfurt-1.aaaaaaaam5dfw6wubrshstsc27hcewh7b6s6q2ofgphzizqgnoipxnyu57pa"

